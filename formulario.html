<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMB BARBERS | Reservá tu turno</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  .form-shell{max-width:560px;margin:0 auto;padding:56px 24px 80px}
  .form-shell h1{font-size:44px;margin-bottom:6px}
  .form-shell .eyebrow{color:var(--accent);letter-spacing:.2em;text-transform:uppercase;font-size:12px;margin-bottom:14px}
  fieldset{border:0;margin-bottom:26px}
  label{display:block;font-size:13px;letter-spacing:.05em;text-transform:uppercase;color:var(--fg-dim);margin-bottom:8px}
  input,select{
    width:100%;background:var(--panel);border:1px solid var(--line);color:var(--fg);
    padding:14px 16px;border-radius:var(--radius);font-family:'Work Sans',sans-serif;font-size:15px;
  }
  input:focus,select:focus{outline:none;border-color:var(--accent)}
  .barber-pick{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .barber-pick label.opt{
    border:1px solid var(--line);border-radius:var(--radius);padding:12px;text-align:center;cursor:pointer;
    text-transform:none;letter-spacing:0;font-size:15px;color:var(--fg);display:flex;flex-direction:column;align-items:center;gap:8px;
  }
  .barber-pick img{width:56px;height:56px;border-radius:50%;object-fit:cover;filter:grayscale(40%)}
  .barber-pick input{width:auto;display:none}
  .barber-pick input:checked + span{color:var(--accent);font-weight:600}
  .barber-pick label.opt:has(input:checked){border-color:var(--accent)}
  #status{margin-top:20px;font-size:14px;color:var(--fg-dim)}
  #status.ok{color:#8fbf7a}
  #status.err{color:#c96a5a}
  button[type=submit]{width:100%;border:0;cursor:pointer;font-family:inherit}
</style>
</head>
<body>

<header>
  <div class="nav wrap">
    <a href="index.html" class="brand">
      <img src="https://placehold.co/76x76/1c1a17/b8874a?text=AMB&font=oswald" alt="AMB BARBERS">
      <span>AMB BARBERS</span>
    </a>
  </div>
</header>
<div class="stripe"></div>

<div class="form-shell">
  <div class="eyebrow">Reserva online</div>
  <h1>Reservá tu turno</h1>
  <p style="color:var(--fg-dim);margin-bottom:36px">Completá tus datos y te confirmamos por WhatsApp al instante, sin esperas.</p>

  <form id="reserva-form">
    <fieldset>
      <label for="nombre">Nombre y apellido</label>
      <input type="text" id="nombre" name="nombre" required placeholder="Juan Pérez">
    </fieldset>

    <fieldset>
      <label for="whatsapp">Tu WhatsApp</label>
      <input type="tel" id="whatsapp" name="whatsapp" required placeholder="264 xxx xxxx">
    </fieldset>

    <fieldset>
      <label>Barbero</label>
      <div class="barber-pick" id="barber-pick"></div>
    </fieldset>

    <fieldset>
      <label for="servicio">Servicio</label>
      <select id="servicio" name="servicio" required>
        <option value="" disabled selected>Elegí un servicio</option>
      </select>
    </fieldset>

    <fieldset>
      <label for="dia">Día</label>
      <input type="date" id="dia" name="dia" required>
    </fieldset>

    <fieldset>
      <label for="horario">Horario</label>
      <select id="horario" name="horario" required>
        <option value="" disabled selected>Elegí un día primero</option>
      </select>
    </fieldset>

    <button type="submit" class="btn btn-primary">Confirmar reserva</button>
    <div id="status"></div>
  </form>
</div>

<script src="data.js"></script>
<script>
  // Barberos
  const barberPick = document.getElementById('barber-pick');
  BARBEROS.forEach(b=>{
    const l = document.createElement('label');
    l.className='opt';
    l.innerHTML = `<input type="radio" name="barbero" value="${b.id}" required><span>${b.nombre}</span>`;
    barberPick.appendChild(l);
  });

  // Servicios
  const servicioSel = document.getElementById('servicio');
  SERVICIOS.forEach(s=>{
    const opt = document.createElement('option');
    opt.value = s.id;
    opt.textContent = `${s.nombre}${s.detalle ? ' - '+s.detalle : ''} (${s.precio})`;
    servicioSel.appendChild(opt);
  });

  // Horarios disponibles según franja de atención (cada 30 min)
  const diaInput = document.getElementById('dia');
  const horarioSel = document.getElementById('horario');
  diaInput.min = new Date().toISOString().split('T')[0];

  diaInput.addEventListener('change', () => {
    const fecha = new Date(diaInput.value + 'T00:00:00');
    const dow = fecha.getDay();
    horarioSel.innerHTML = '';
    if (!DIAS_ATENCION.includes(dow)) {
      const opt = document.createElement('option');
      opt.textContent = 'Cerrado ese día';
      horarioSel.appendChild(opt);
      return;
    }
    const [hIni, mIni] = HORARIO_APERTURA.split(':').map(Number);
    const [hFin, mFin] = HORARIO_CIERRE.split(':').map(Number);
    let t = hIni*60+mIni;
    const fin = hFin*60+mFin;
    const first = document.createElement('option');
    first.disabled = true; first.selected = true; first.textContent = 'Elegí un horario';
    horarioSel.appendChild(first);
    while (t < fin) {
      const hh = String(Math.floor(t/60)).padStart(2,'0');
      const mm = String(t%60).padStart(2,'0');
      const opt = document.createElement('option');
      opt.value = `${hh}:${mm}`;
      opt.textContent = `${hh}:${mm}`;
      horarioSel.appendChild(opt);
      t += 30;
    }
  });

  // Envío al backend (el bot manda la confirmación automática por WhatsApp)
  const form = document.getElementById('reserva-form');
  const status = document.getElementById('status');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    status.className=''; status.textContent = 'Enviando reserva...';

    const data = {
      nombre: document.getElementById('nombre').value,
      whatsapp: document.getElementById('whatsapp').value,
      barbero: form.barbero.value,
      servicio: servicioSel.value,
      dia: diaInput.value,
      horario: horarioSel.value,
    };

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      });
      if (!res.ok) throw new Error('No se pudo enviar');
      status.className='ok';
      status.textContent = '¡Reserva enviada! Te llega la confirmación por WhatsApp en instantes.';
      form.reset();
    } catch (err) {
      status.className='err';
      status.textContent = 'Hubo un problema al enviar la reserva. Probá de nuevo o escribinos por WhatsApp.';
    }
  });
</script>
</body>
</html>
